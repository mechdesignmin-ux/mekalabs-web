<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEKA LABS | 메카랩스</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        /* 디자인(CSS) 설정 */
        :root {
            --bg-color: #0a0a0a; /* 아주 어두운 검은색 배경 */
            --text-main: #ffffff; /* 기본 글씨색 (흰색) */
            --text-muted: #888888; /* 설명글 색상 (회색) */
            --accent-blue: #3b5bff; /* 강조용 파란색 */
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* 1. 맨 위 상단 메뉴바 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
        }
        .logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            background-color: var(--accent-blue);
            color: white;
            padding: 4px 8px;
            border-radius: 2px;
            font-size: 18px;
        }
        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            transition: color 0.3s;
        }
        .nav-links a:hover {
            color: var(--text-main);
        }
        .btn-quote {
            border: 1px solid var(--accent-blue);
            color: var(--text-main);
            background: transparent;
            padding: 10px 24px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-quote:hover {
            background-color: var(--accent-blue);
        }

        /* 2. 메인 대문  */
        .hero {
            padding: 80px 5% 100px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .hero-subtitle {
            color: var(--accent-blue);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .hero-subtitle::before {
            content: "";
            display: inline-block;
            width: 40px;
            height: 1px;
            background-color: var(--accent-blue);
        }
        .hero h1 {
            font-size: 75px;
            font-weight: 800;
            line-height: 1.15;
            margin: 0 0 30px 0;
            letter-spacing: -2px;
        }
        .text-blue {
            color: var(--accent-blue);
        }
        .hero-desc {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.7;
            max-width: 500px;
            margin-bottom: 50px;
            word-break: keep-all; /*줄바꿈 */
        }

        /* 3. 버튼 묶음 */
        .button-group {
            display: flex;
            gap: 15px;
        }
        .btn-primary {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-secondary {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid #333;
            padding: 18px 35px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-secondary:hover {
            border-color: var(--text-muted);
            color: var(--text-main);
        }

        /* 4. 두 번째 압도적인 퍼포먼스 섹션 */
        .performance {
            padding: 50px 5% 100px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }
        .performance h2 {
            font-size: 38px;
            font-weight: 800;
            margin: 0 0 20px 0;
            letter-spacing: -1.5px;
        }
        /* 우측 하단 연한 글씨  */
        .bg-text {
            position: absolute;
            right: 0;
            top: 10px;
            font-size: 140px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            margin: 0;
            letter-spacing: 5px;
            z-index: -1;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">M</span> MEKA LABS
        </div>
        <div class="nav-links">
            <a href="#">ABOUT</a>
            <a href="#">FEATURES</a>
            <a href="#">PROCESS</a>
            <button class="btn-quote">QUOTE</button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-subtitle">NEXT-GEN MANUFACTURING</div>
        <h1>
            도면이 없어도<br>
            괜찮습니다.<br>
            아이디어를<br>
            <span class="text-blue">현실로</span> 만듭니다.
        </h1>
        <p class="hero-desc">
            MEKA LABS는 최첨단 듀얼 노즐 3D 프린터와 AI 모델링 기술을 활용하여 초정밀, 초고속 원스톱 서비스를 제공합니다. 스케치 한 장으로 시작되는 완벽한 제조.
        </p>
        <div class="button-group">
            <button class="btn-primary">무료 견적/상담 신청하기 →</button>
            <button class="btn-secondary">서비스 알아보기</button>
        </div>
    </header>

    <section class="performance">
        <h2 class="bg-text">PRO</h2>
        <h2>압도적인 <span class="text-blue">퍼포먼스</span></h2>
        <p class="hero-desc">
            취미용이 아닙니다. 실제 산업 현장에서 요구하는 정밀도와 내구성을 충족하는 프리미엄 제조 서비스입니다.
        </p>
    </section>

</body>
</html>
